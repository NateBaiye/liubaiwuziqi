<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gomoku Private Access</title>
    <style>
      :root {
        --bg: #f3e6d1;
        --panel: #fff8eb;
        --ink: #2d241b;
        --accent: #8f4b1f;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at top, #fff4de 0%, var(--bg) 65%);
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
        color: var(--ink);
      }
      .card {
        width: min(92vw, 360px);
        padding: 1.2rem;
        border-radius: 14px;
        border: 2px solid #d8bf9f;
        background: var(--panel);
      }
      h1 {
        margin: 0 0 0.35rem;
        font-size: 1.3rem;
      }
      p {
        margin: 0 0 0.9rem;
        color: #604e3f;
      }
      input,
      button {
        font: inherit;
      }
      input {
        width: 100%;
        border-radius: 8px;
        border: 1px solid #b39a7b;
        padding: 0.6rem 0.65rem;
        margin-bottom: 0.7rem;
      }
      button {
        width: 100%;
        border: none;
        border-radius: 8px;
        padding: 0.62rem;
        background: var(--accent);
        color: #fff;
        cursor: pointer;
      }
      button:hover {
        filter: brightness(0.95);
      }
      .hint {
        margin-top: 0.65rem;
        font-size: 0.83rem;
        color: #7a6756;
      }
      .error {
        display: none;
        margin-top: 0.55rem;
        color: #9c2d1a;
        font-size: 0.9rem;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Private Gomoku</h1>
      <p>Enter the password to access the game.</p>
      <form method="POST" action="/auth">
        <input type="password" name="password" placeholder="Password" required />
        <button type="submit">Enter</button>
      </form>
      <div id="error" class="error">Incorrect password. Please try again.</div>
      <div class="hint">Ask the owner for the access password.</div>
    </main>
    <script>
      const params = new URLSearchParams(window.location.search);
      if (params.get("error") === "1") {
        document.getElementById("error").style.display = "block";
      }
    </script>
  </body>
</html>
